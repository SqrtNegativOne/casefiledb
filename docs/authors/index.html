<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authors — Casefile Database</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="toolbar">
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
            <h1><a href="../" class="home-link">Casefile Database</a></h1>
            <nav class="site-nav">
                <a href="../">Media</a>
                <a href="../authors/" class="active">Authors</a>
                <a href="../methods/">Methods</a>
            </nav>
        </div>
        <div class="toolbar-controls">
            <input type="text" id="searchInput" placeholder="Search author...">
            <select id="sortField" aria-label="Sort field">
                <option value="name">Sort: Name</option>
                <option value="works">Sort: Works</option>
                <option value="deaths">Sort: Deaths</option>
            </select>
            <select id="sortDirection" aria-label="Sort direction">
                <option value="asc">Asc</option>
                <option value="desc">Desc</option>
            </select>
            <button id="themeToggle" type="button">Dark mode</button>
        </div>
    </header>
    <div class="meta-row">
        <span id="resultCount" class="muted"></span>
    </div>
    <div class="table-wrap">
        <table aria-label="Authors table">
            <thead>
                <tr>
                    <th data-sort-key="name" class="sortable">Author / Creator</th>
                    <th data-sort-key="works" class="sortable">Works</th>
                    <th data-sort-key="deaths" class="sortable">Total deaths</th>
                    <th>Media types</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
