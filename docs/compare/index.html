<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare — Casefile Database</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            max-width: 1120px;
            margin: 1rem auto;
        }
        .compare-panel {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            overflow: hidden;
        }
        .compare-panel-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .compare-panel-header select {
            flex: 1;
            min-width: 140px;
        }
        .compare-panel-body {
            padding: 1rem;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: var(--muted); }
        .stat-value { font-weight: 600; font-size: 1rem; }
        .stat-bar-wrap {
            margin-top: 0.25rem;
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }
        .stat-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 300ms ease;
        }
        .compare-hint { color: var(--muted); font-size: 0.9rem; padding: 1rem 0; }
        .top-list { margin: 0; padding: 0; list-style: none; }
        .top-list li { display: flex; justify-content: space-between; padding: 0.2rem 0; font-size: 0.88rem; }
        .top-list li span:first-child { color: var(--muted); }
        @media (max-width: 680px) {
            .compare-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="toolbar">
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
            <h1><a href="../" class="home-link">Casefile Database</a></h1>
            <nav class="site-nav">
                <a href="../">Media</a>
                <a href="../authors/">Authors</a>
                <a href="../episodes/">Episodes</a>
                <a href="../methods/">Methods</a>
                <a href="../compare/" class="active">Compare</a>
                <a href="../viz/">Viz</a>
            </nav>
        </div>
        <div class="toolbar-controls">
            <button id="themeToggle" type="button">Dark mode</button>
        </div>
    </header>
    <div class="compare-grid">
        <div class="compare-panel">
            <div class="compare-panel-header">
                <select id="modeA" aria-label="Compare mode A">
                    <option value="author">Author</option>
                    <option value="media">Work</option>
                </select>
                <select id="selectA" aria-label="Select A"></select>
            </div>
            <div class="compare-panel-body" id="panelA">
                <p class="compare-hint">Select an author or work above.</p>
            </div>
        </div>
        <div class="compare-panel">
            <div class="compare-panel-header">
                <select id="modeB" aria-label="Compare mode B">
                    <option value="author">Author</option>
                    <option value="media">Work</option>
                </select>
                <select id="selectB" aria-label="Select B"></select>
            </div>
            <div class="compare-panel-body" id="panelB">
                <p class="compare-hint">Select an author or work above.</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
