<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episodes — Casefile Database</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="toolbar">
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
            <h1><a href="../" class="home-link">Casefile Database</a></h1>
            <nav class="site-nav">
                <a href="../">Media</a>
                <a href="../authors/">Authors</a>
                <a href="../episodes/" class="active">Episodes</a>
                <a href="../methods/">Methods</a>
                <a href="../compare/">Compare</a>
                <a href="../viz/">Viz</a>
            </nav>
        </div>
        <div class="toolbar-controls">
            <input type="text" id="searchInput" placeholder="Search title, show...">
            <select id="showFilter" aria-label="Filter by show">
                <option value="">All shows</option>
            </select>
            <select id="sortField" aria-label="Sort field">
                <option value="show">Sort: Show</option>
                <option value="season">Sort: Season</option>
                <option value="episode">Sort: Episode</option>
                <option value="year">Sort: Year</option>
                <option value="deaths">Sort: Deaths</option>
                <option value="title">Sort: Title</option>
            </select>
            <select id="sortDirection" aria-label="Sort direction">
                <option value="asc">Asc</option>
                <option value="desc">Desc</option>
            </select>
            <button id="themeToggle" type="button">Dark mode</button>
        </div>
    </header>
    <div class="meta-row">
        <span id="resultCount" class="muted"></span>
    </div>
    <div class="table-wrap">
        <table aria-label="Episodes table">
            <thead>
                <tr>
                    <th data-sort-key="show" class="sortable">Show</th>
                    <th data-sort-key="season" class="sortable">S</th>
                    <th data-sort-key="episode" class="sortable">Ep</th>
                    <th data-sort-key="title" class="sortable">Title</th>
                    <th data-sort-key="year" class="sortable">Year</th>
                    <th data-sort-key="deaths" class="sortable">Deaths</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
