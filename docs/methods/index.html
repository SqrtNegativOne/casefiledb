<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methods — Casefile Database</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="toolbar">
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
            <h1><a href="../" class="home-link">Casefile Database</a></h1>
            <nav class="site-nav">
                <a href="../">Media</a>
                <a href="../authors/">Authors</a>
                <a href="../methods/" class="active">Methods</a>
            </nav>
        </div>
        <div class="toolbar-controls">
            <button id="themeToggle" type="button">Dark mode</button>
        </div>
    </header>
    <div class="meta-row">
        <span id="resultCount" class="muted"></span>
    </div>
    <div class="table-wrap">
        <table aria-label="Death methods table">
            <thead>
                <tr>
                    <th>Method</th>
                    <th>Deaths</th>
                    <th>% of total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
