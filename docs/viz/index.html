<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisations — Casefile Database</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .viz-wrap {
            max-width: 1120px;
            margin: 0 auto;
            display: grid;
            gap: 2rem;
        }
        .viz-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem 1.5rem;
        }
        .viz-card h2 {
            margin: 0 0 0.25rem;
            font-size: 1rem;
            font-weight: 600;
        }
        .viz-card .viz-subtitle {
            color: var(--muted);
            font-size: 0.82rem;
            margin: 0 0 1.25rem;
        }
        svg text { font-family: inherit; fill: var(--text); }
        svg .axis-label { fill: var(--muted); font-size: 11px; }
        svg .bar { fill: var(--accent); opacity: 0.85; }
        svg .bar:hover { opacity: 1; }
        svg .bar-secondary { fill: var(--muted); opacity: 0.5; }
        svg .gridline { stroke: var(--border); stroke-dasharray: 3 3; }
        svg .error-bar { stroke: var(--text); stroke-width: 1.5; opacity: 0.6; }
        svg .error-cap { stroke: var(--text); stroke-width: 1.5; opacity: 0.6; }
        .viz-legend {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .viz-legend span { display: flex; align-items: center; gap: 0.35rem; }
        .legend-dot {
            width: 10px; height: 10px; border-radius: 2px;
            background: var(--accent); display: inline-block;
        }
        .legend-dot.secondary { background: var(--muted); opacity: 0.5; }
    </style>
</head>
<body>
    <header class="toolbar">
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
            <h1><a href="../" class="home-link">Casefile Database</a></h1>
            <nav class="site-nav">
                <a href="../">Media</a>
                <a href="../authors/">Authors</a>
                <a href="../episodes/">Episodes</a>
                <a href="../methods/">Methods</a>
                <a href="../compare/">Compare</a>
                <a href="../viz/" class="active">Viz</a>
            </nav>
        </div>
        <div class="toolbar-controls">
            <button id="themeToggle" type="button">Dark mode</button>
        </div>
    </header>
    <div class="viz-wrap" id="vizWrap">
        <p class="muted">Loading&hellip;</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
