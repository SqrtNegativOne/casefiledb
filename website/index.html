<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casefile Database</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="toolbar">
        <h1>Casefile Database</h1>
        <div class="toolbar-controls">
            <input type="text" id="searchInput" placeholder="Search title, creator, type...">
            <select id="typeFilter" aria-label="Filter by media type">
                <option value="">All types</option>
            </select>
            <select id="deathsFilter" aria-label="Filter by deaths">
                <option value="">Any deaths</option>
                <option value="0">No deaths</option>
                <option value="1">1+ deaths</option>
                <option value="2">2+ deaths</option>
            </select>
            <label class="checkbox-filter">
                <input type="checkbox" id="twistFilter">
                Has twist
            </label>
            <select id="sortField" aria-label="Sort field">
                <option value="title">Sort: Title</option>
                <option value="creator">Sort: Creator</option>
                <option value="year">Sort: Year</option>
                <option value="media_type">Sort: Type</option>
                <option value="deaths">Sort: Deaths</option>
            </select>
            <select id="sortDirection" aria-label="Sort direction">
                <option value="asc">Asc</option>
                <option value="desc">Desc</option>
            </select>
            <button id="themeToggle" type="button" aria-label="Toggle dark mode">Dark mode</button>
        </div>
    </header>
    <div class="meta-row">
        <span id="resultCount" class="muted"></span>
    </div>
    <div class="table-wrap">
        <table id="mediaTable" aria-label="Casefile media table">
            <thead>
                <tr>
                    <th data-sort-key="title" class="sortable">Title</th>
                    <th data-sort-key="creator" class="sortable">Creator</th>
                    <th data-sort-key="year" class="sortable">Year</th>
                    <th data-sort-key="media_type" class="sortable">Type</th>
                    <th data-sort-key="deaths" class="sortable">Deaths</th>
                    <th>Notes</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="mediaTableBody"></tbody>
        </table>
    </div>
    <script src="site_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
